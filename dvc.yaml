stages:
  preprocess:
    cmd: uv run python src/preprocessing.py
    deps:
      - data/raw/tweets.csv
      - src/preprocessing.py
    outs:
      - data/processed/tweets_clean.csv

  train:
    cmd: uv run python src/models/train.py
    deps:
      - data/processed/tweets_clean.csv
      - src/models/train.py
    outs:
      - models/vectorizer.pkl
      - models/logistic_regression.pkl
      - models/naive_bayes.pkl
      - models/random_forest.pkl
      - models/test_data.csv
      - models/test_predictions.csv

  evaluate:
    cmd: uv run python src/models/evaluate.py
    deps:
      - models/test_predictions.csv
      - src/models/evaluate.py
    outs:
      - models/confusion_matrices.png
      - models/roc_curves.png
    metrics:
      - models/metrics.json:
          cache: false
